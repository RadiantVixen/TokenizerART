<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkey42NFT — Mint On-Chain NFT</title>

<style>
body {
    background: #0f0f0f;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 20px;
}
h1 { color: #42d742; }
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: #1f1f1f;
    border: 1px solid #333;
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    background: #42d742;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    color: black;
    font-weight: bold;
}
button:hover { background: #32a832; }
.box { border: 1px solid #333; padding: 20px; margin-top: 20px; }
</style>

<!-- ✅ ethers v5 (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

</head>

<body>

<h1>Monkey42 NFT — On-Chain Mint</h1>

<button id="connectBtn">🔌 Connect Wallet</button>
<p id="walletAddress">Not connected</p>

<div class="box">
    <h2>Mint New NFT</h2>
    <input id="recipient" placeholder="Recipient Address">
    <input id="nftName" placeholder="NFT Name (must include 42)">
    <textarea id="description" placeholder="NFT Description"></textarea>
    <textarea id="base64Image" placeholder="Base64 Image (PNG/SVG)"></textarea>
    <button id="mintBtn">MINT NFT</button>
    <p id="mintStatus"></p>
</div>

<div class="box">
    <h2>Read tokenURI</h2>
    <input id="uriTokenId" placeholder="Token ID">
    <button id="uriBtn">Get Metadata</button>
    <textarea id="uriOutput"></textarea>
</div>

<div class="box">
    <h2>Check Ownership</h2>
    <input id="ownerTokenId" placeholder="Token ID">
    <button id="ownerBtn">Check Owner</button>
    <p id="ownerOutput"></p>
</div>

<div class="box">
    <h2>Total NFTs Minted</h2>
    <button id="counterBtn">Get tokenIdCounter()</button>
    <p id="counterOutput"></p>
</div>

<script>

// ------------------------------------------
// CONTRACT CONFIG
// ------------------------------------------
const CONTRACT_ADDRESS = "0x3dA4B2De0C41FD930851d3E36d67C2FdB8EEccE7";

const CONTRACT_ABI = [
    {
        "inputs": [
            {"internalType": "address", "name": "recipient", "type": "address"},
            {"internalType": "string", "name": "name_", "type": "string"},
            {"internalType": "string", "name": "description_", "type": "string"},
            {"internalType": "string", "name": "svg_", "type": "string"}
        ],
        "name": "mintNFT",
        "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
        "stateMutability": "nonpayable",
        "type": "function"
    },
    {
        "inputs": [{"internalType": "uint256", "name": "tokenId", "type": "uint256"}],
        "name": "ownerOf",
        "outputs": [{"internalType": "address", "name": "", "type": "address"}],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [{"internalType": "uint256", "name": "tokenId", "type": "uint256"}],
        "name": "tokenURI",
        "outputs": [{"internalType": "string", "name": "", "type": "string"}],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [],
        "name": "tokenIdCounter",
        "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
        "stateMutability": "view",
        "type": "function"
    }
];

// ------------------------------------------
// GLOBALS
// ------------------------------------------
let provider, signer, contract;

// ------------------------------------------
// HELPERS
// ------------------------------------------
function setStatus(msg) {
    document.getElementById("walletAddress").innerText = msg;
}

function requireWallet() {
    if (!contract) {
        setStatus("Connect wallet first!");
        return false;
    }
    return true;
}

// ------------------------------------------
// CONNECT WALLET
// ------------------------------------------
async function connectWallet() {
    if (typeof ethers === "undefined") {
        setStatus("Ethers library not loaded.");
        return;
    }

    if (!window.ethereum) {
        alert("MetaMask not found!");
        return;
    }

    try {
        const SEPOLIA_CHAIN_ID = "0xaa36a7";

        const chainId = await window.ethereum.request({ method: "eth_chainId" });

        if (chainId !== SEPOLIA_CHAIN_ID) {
            await window.ethereum.request({
                method: "wallet_switchEthereumChain",
                params: [{ chainId: SEPOLIA_CHAIN_ID }],
            });
        }

        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);

        signer = provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

        const address = await signer.getAddress();
        setStatus("Connected: " + address);

    } catch (err) {
        console.error(err);
        const errorMessage = err && err.message ? err.message : String(err);
        setStatus("Connection failed: " + errorMessage);
    }
}

// ------------------------------------------
// MINT NFT
// ------------------------------------------
async function mintNFT() {
    if (!requireWallet()) return;

    try {
        const recipient = document.getElementById("recipient").value;
        const name = document.getElementById("nftName").value;
        const description = document.getElementById("description").value;
        const base64Image = document.getElementById("base64Image").value;

        const tx = await contract.mintNFT(recipient, name, description, base64Image);

        document.getElementById("mintStatus").innerText = "Transaction sent...";
        await tx.wait();

        document.getElementById("mintStatus").innerText = "NFT Minted ✅";

    } catch (err) {
        console.error(err);
        alert(err.message);
    }
}

// ------------------------------------------
// GET TOKEN URI
// ------------------------------------------
async function getTokenURI() {
    if (!requireWallet()) return;

    try {
        const id = document.getElementById("uriTokenId").value;
        const uri = await contract.tokenURI(id);
        document.getElementById("uriOutput").value = uri;
    } catch (err) {
        alert(err.message);
    }
}

// ------------------------------------------
// GET OWNER
// ------------------------------------------
async function getOwner() {
    if (!requireWallet()) return;

    try {
        const id = document.getElementById("ownerTokenId").value;
        const owner = await contract.ownerOf(id);
        document.getElementById("ownerOutput").innerText = owner;
    } catch (err) {
        alert(err.message);
    }
}

// ------------------------------------------
// GET COUNTER
// ------------------------------------------
async function getCounter() {
    if (!requireWallet()) return;

    try {
        const count = await contract.tokenIdCounter();
        document.getElementById("counterOutput").innerText = count;
    } catch (err) {
        alert(err.message);
    }
}

// ------------------------------------------
// EVENTS (cleaner than onclick)
// ------------------------------------------
document.getElementById("connectBtn").onclick = connectWallet;
document.getElementById("mintBtn").onclick = mintNFT;
document.getElementById("uriBtn").onclick = getTokenURI;
document.getElementById("ownerBtn").onclick = getOwner;
document.getElementById("counterBtn").onclick = getCounter;

</script>

</body>
</html>
